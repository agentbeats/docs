name: Documentation
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    env:
      PAGE_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ env.PAGE_ARTIFACT_NAME }}
          path: site
      - uses: actions/deploy-pages@v5
        id: deployment
        with:
          artifact_name: ${{ env.PAGE_ARTIFACT_NAME }}
